<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <title>منظومة صيانة أسيوط جنوب</title>
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 12px; }
        .section-header { background: #2c3e50; color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        .trans-box { border-right: 5px solid #007bff; background: #eef7ff; }
        .line-box { border-right: 5px solid #ffc107; background: #fffdf5; }
        .target-col { background-color: #fff9e6; }
        .done-col { background-color: #e6ffed; }
    </style>
</head>
<body class="p-3">
    <div class="container-fluid card shadow p-4">
        <div class="text-center mb-4 border-bottom pb-3">
            <h2 class="text-primary fw-bold">إدارة الصيانة - قطاع أسيوط جنوب</h2>
            <p class="text-muted">نظام إدخال الإنتاج اليومي الموحد</p>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <label class="fw-bold">الهندسة التابعة:</label>
                <select id="dept" class="form-select border-primary">
                    {% for d in depts %}<option value="{{d}}">{{d}}</option>{% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="fw-bold">تاريخ التنفيذ:</label>
                <input type="date" id="date" class="form-control border-primary">
            </div>
            <div class="col-md-4">
                <label class="fw-bold">اسم القائم بالتسجيل (مهندس/فني):</label>
                <input type="text" id="user_name" class="form-control border-primary" placeholder="اكتب اسمك هنا">
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <div class="p-3 rounded shadow-sm trans-box h-100">
                    <div class="section-header text-center">بيانات فرقة صيانة المحولات</div>
                    <div class="row g-2">
                        <div class="col-md-8"><input type="text" id="trans_name" class="form-control" placeholder="اسم المحول"></div>
                        <div class="col-md-4"><input type="text" id="trans_power" class="form-control" placeholder="القدرة"></div>
                        <div class="col-12"><input type="text" id="trans_addr" class="form-control" placeholder="العنوان"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="p-3 rounded shadow-sm line-box h-100">
                    <div class="section-header text-center" style="background: #856404;">بيانات فرقة الجهد المتوسط</div>
                    <div class="row g-2">
                        <div class="col-12"><input type="text" id="line_name" class="form-control" placeholder="اسم الخط الهوائي"></div>
                        <div class="col-md-8"><input type="text" id="line_src" class="form-control" placeholder="مصدر التغذية"></div>
                        <div class="col-md-4"><input type="number" id="line_len" class="form-control" placeholder="الطول كم"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-dark text-center">
                    <tr>
                        <th>بند الصيانة</th>
                        <th style="width: 80px;">الوحدة</th>
                        <th style="width: 130px;">المستهدف</th>
                        <th style="width: 130px;">المنفذ</th>
                        <th style="width: 100px;">النسبة</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in items %}
                    <tr>
                        <td class="fw-bold text-dark">{{ item.name }}</td>
                        <td class="text-center"><span class="badge bg-secondary">{{ item.unit }}</span></td>
                        <td><input type="number" step="0.01" class="form-control target-col text-center" id="t_{{item.id}}" oninput="calc('{{item.id}}')"></td>
                        <td><input type="number" step="0.01" class="form-control done-col text-center" id="d_{{item.id}}" oninput="calc('{{item.id}}')"></td>
                        <td id="p_{{item.id}}" class="text-center fw-bold">0%</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="mt-3">
            <label class="fw-bold">ملاحظات إضافية:</label>
            <textarea id="notes" class="form-control" rows="2"></textarea>
        </div>

        <button onclick="saveReport()" class="btn btn-primary w-100 py-3 mt-4 fw-bold shadow-lg">حفظ التقرير النهائي في قاعدة البيانات</button>
    </div>

    <script>
        function calc(id) {
            let t = document.getElementById('t_'+id).value || 0;
            let d = document.getElementById('d_'+id).value || 0;
            let p = t > 0 ? ((d/t)*100).toFixed(1) : 0;
            document.getElementById('p_'+id).innerText = p + '%';
        }

        async function saveReport() {
            let entries = {};
            {% for item in items %}
                let t_val = document.getElementById('t_{{item.id}}').value;
                let d_val = document.getElementById('d_{{item.id}}').value;
                if(t_val || d_val) entries['{{item.id}}'] = {target: t_val || 0, done: d_val || 0};
            {% endfor %}

            const payload = {
                dept: document.getElementById('dept').value,
                date: document.getElementById('date').value,
                user_name: document.getElementById('user_name').value,
                trans_name: document.getElementById('trans_name').value,
                trans_power: document.getElementById('trans_power').value,
                trans_addr: document.getElementById('trans_addr').value,
                line_name: document.getElementById('line_name').value,
                line_src: document.getElementById('line_src').value,
                line_len: document.getElementById('line_len').value,
                notes: document.getElementById('notes').value,
                entries: entries
            };

            const response = await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            alert(result.msg);
        }
    </script>
</body>
</html>
